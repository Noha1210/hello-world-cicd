name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Hello World
        run: echo "Hello World! CI/CD Pipeline is running!"

  build-and-push:
    runs-on: ubuntu-latest
    needs: hello-world
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/noha1210/hello-world-cicd:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy
        run: |
          echo "Deploying latest image from GHCR..."
          docker pull ghcr.io/noha1210/hello-world-cicd:latest
          docker stop hello-world || true
          docker rm hello-world || true
          docker run -d -p 80:80 --name hello-world ghcr.io/noha1210/hello-world-cicd:latest
          echo "Deployment complete!"

          
        
